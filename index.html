<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Schedule Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body data-page-title="Daily Schedule">

<div class="current-time-display" data-current-task="Daily Schedule">
    <div class="time" id="currentTime">--:-- --</div>
    <div class="activity" id="currentActivity">Loading schedule...</div>
  <button class="menu-toggle" type="button" aria-label="Open menu">☰</button>
</div>

<nav class="site-nav">
    <a href="index.html" class="active">Schedule</a>
    <a href="daily-tracker.html">Daily Tracker</a>
    <a href="weekly-summary.html">Weekly Summary</a>
    <a href="course-progress.html">Course Progress</a>
    <a href="fat-loss-tracking.html">Fat Loss Tracking</a>
    <a href="family-time-log.html">Family Time Log</a>
    <a href="freelance-tracker.html">Freelance Tracker</a>
    <a href="health-checklist.html">Health Checklist</a>
</nav>

<div class="page-content">

<h2 style="font-size: 22px; font-weight: 500; margin-bottom: 0.5rem;">Your Complete Daily Schedule</h2>
<p style="font-size: 14px; color: var(--color-text-secondary); margin-bottom: 2rem;">Fat loss journey • Family time • Learning • Freelancing</p>

<div class="config-controls" style="margin-bottom: 1rem;">
    <button id="export-schedule-config">Export Config</button>
    <input type="file" id="import-schedule-config" accept=".json" style="display: none;">
    <label for="import-schedule-config" style="cursor: pointer; padding: 0.5rem 1rem; background: #007acc; color: white; border-radius: 4px;">Import Config</label>
</div>

<!-- Content will be generated dynamically -->

</div>

<script src="script.js"></script>

<script>
let currentScheduleConfig = null;

(async () => {
    currentScheduleConfig = await loadTrackerConfig('schedule-config.json');
    if (currentScheduleConfig) {
        generateSchedulePage(currentScheduleConfig);
    }

    // Export config
    document.getElementById('export-schedule-config').addEventListener('click', () => {
        if (!currentScheduleConfig) return;
        const dataStr = JSON.stringify(currentScheduleConfig, null, 2);
        const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
        const exportFileDefaultName = 'schedule-config.json';
        const linkElement = document.createElement('a');
        linkElement.setAttribute('href', dataUri);
        linkElement.setAttribute('download', exportFileDefaultName);
        linkElement.click();
    });

    // Import config
    document.getElementById('import-schedule-config').addEventListener('change', (event) => {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const newConfig = JSON.parse(e.target.result);
                currentScheduleConfig = newConfig;
                // Clear existing content except title and controls
                const pageContent = document.querySelector('.page-content');
                const h2 = pageContent.querySelector('h2');
                const p = pageContent.querySelector('p');
                const controls = pageContent.querySelector('.config-controls');
                pageContent.innerHTML = '';
                pageContent.appendChild(h2);
                pageContent.appendChild(p);
                pageContent.appendChild(controls);
                generateSchedulePage(currentScheduleConfig);
            } catch (error) {
                alert('Invalid JSON file');
            }
        };
        reader.readAsText(file);
    });
})();
</script>

<script src="script.js"></script>
</body>
</html>
